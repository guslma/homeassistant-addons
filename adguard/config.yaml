name: AdGuard Home
version: v0.107.73
slug: adguard
description: Network-wide ads & trackers blocking DNS server
url: https://hub.docker.com/r/adguard/adguardhome
image: adguard/adguardhome
arch:
- aarch64
- amd64
- armv7
backup_exclude:
- '*/adguard/data/querylog.*'
host_network: true
init: false
map:
- path: /opt/adguardhome/work
  read_only: false
  type: addon_config
- path: /opt/adguardhome/conf
  read_only: false
  type: addon_config
ports:
  53/udp: 53
  80/tcp: null
ports_description:
  53/udp: DNS server port
  80/tcp: Web interface (Not required for Ingress)
webui: http://[HOST]:[PORT:80]

