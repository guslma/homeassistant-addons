name: Pihole
version: 2026.02.0
slug: pihole
description: Network-wide ads & trackers blocking DNS server
url: https://hub.docker.com/r/pihole/pihole
image: pihole/pihole
arch:
- aarch64
- amd64
- armv7
map:
- path: /etc/pihole
  read_only: false
  type: addon_config
host_network: true
init: false
environment:
  FTLCONF_webserver_api_password: 'admin'
  FTLCONF_dns_listeningMode: 'ALL'
ports:
  53/tcp: 53
  53/udp: 53
  80/tcp: 80
ports_description:
  53/udp: DNS server port
  53/tcp: DNS server port
  80/tcp: Web interface
webui: http://[HOST]:[PORT:80]/admin/
