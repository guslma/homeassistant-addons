name: AdGuard Home
version: v0.107.61
slug: adguard
description: Network-wide ads & trackers blocking DNS server
url: https://hub.docker.com/r/adguard/adguardhome
image: adguard/adguardhome
arch:
- aarch64
- amd64
- armv7
host_network: true
init: false
map:
- path: /opt/adguardhome/work
  read_only: false
  type: data
- path: /opt/adguardhome/conf
  read_only: false
  type: data
ports:
  53/tcp: 53
  53/udp: 53
  80/tcp: 80
ports_description:
  53/tcp: DNS port
  53/udp: DNS server port
  80/tcp: Web interface
webui: http://[HOST]:[PORT:80]
