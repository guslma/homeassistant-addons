name: Pihole
version: 2026.02.0
slug: pihole
description: Network-wide ads & trackers blocking DNS server
url: https://hub.docker.com/r/pihole/pihole
image: pihole/pihole
arch:
- aarch64
- amd64
- armv7
backup_exclude:
- node_modules
host_network: true
init: false
ports_description:
  53/udp: DNS server port
  53/tcp: DNS server port
  80/tcp: Web interface
webui: http://[HOST]:[PORT:80]
